name: healthcareapp_try1
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  font_awesome_flutter: ^10.12.0
  liquid_swipe: ^3.1.0
  equatable: ^2.0.8
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  curved_navigation_bar: ^1.0.6
  buttons_tabbar: ^1.3.10
  lottie: ^3.1.2
  animated_custom_dropdown: ^3.1.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.0.0
  app_links: ^6.0.0
  pinput: ^5.0.0
  geolocator: ^13.0.4
  flutter_native_splash: ^2.3.10
  bloc_concurrency: ^0.3.0
  flutter_inset_box_shadow: ^1.0.8
  intl: ^0.20.2
  webview_flutter: ^4.4.2
  skeletonizer: ^2.1.3
  fluttertoast: ^8.2.4



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#c4edff"
  image: assets/images/GP_Logo-removebg-preview.png
  android: true
  ios: true
  
flutter:
  fonts:
    - family: Cotta
      fonts:
        - asset: assets/fonts/Cotta Free.otf
    - family : Agency
      fonts :
        - asset: assets/fonts/agency.otf
    - family : BungeeSpice
      fonts :
        - asset: assets/fonts/BungeeSpice-Regular.ttf
    - family : IosevkaCharonMono
      fonts :
        - asset: assets/fonts/IosevkaCharonMono-Regular.ttf
    - family : Pacifico
      fonts :
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family : ElMessiri
      fonts :
        - asset: assets\fonts\ElMessiri-VariableFont_wght.ttf
  uses-material-design: true
  assets:
    - assets/backgrounds/
    - assets/images/
    - assets/icons/
    - assets/animations/

